# Basic ODK workflow

name: CI

on:
  push:
    branches:
      - main
      - odk-migration
  pull_request:
    branches:
      - main
      - odk-migration
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ontology_qc:
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run QC and build release artefacts
        env:
          DEFAULT_BRANCH: main
        run: cd src/ontology && make ROBOT_ENV='ROBOT_JAVA_ARGS=-Xmx6G' prepare_release_fast -B

      - name: Commit release artefacts to repository
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            pbpko.owl pbpko.obo \
            pbpko-base.owl pbpko-base.obo \
            pbpko-full.owl pbpko-full.obo \
            imports/*.owl \
            mappings/pbpko-sssom.sssom.tsv
          if git diff --staged --quiet; then
            echo "Release artefacts unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh release artefacts [skip ci]"
          git push

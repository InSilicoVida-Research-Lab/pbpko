# Basic ODK workflow

name: CI

on:
  push:
    branches:
      - main
      - odk-migration
  pull_request:
    branches:
      - main
      - odk-migration
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  ontology_qc:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run QC and build release artefacts
        env:
          DEFAULT_BRANCH: main
        run: |
          mkdir -p src/ontology/tmp
          if [ -f pbpko.owl ]; then
            cp pbpko.owl src/ontology/tmp/current-release.owl
          fi
          cd src/ontology && make ROBOT_ENV='ROBOT_JAVA_ARGS=-Xmx6G' prepare_release_fast

      - name: Commit release artefacts to repository
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            pbpko.owl pbpko.obo \
            pbpko-base.owl pbpko-base.obo \
            pbpko-full.owl pbpko-full.obo \
            imports/*.owl
          git add -f mappings/pbpko-sssom.sssom.tsv
          if git diff --staged --quiet; then
            echo "Release artefacts unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "chore(release-artifacts): refresh build outputs [skip ci]"
          git push
